<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  :root { --bg:#1b1816; --line:#3a3431; --text:#ece6df; --muted:#9a918a; --green:#2ea043; --amber:#bb8009; --red:#cf2f2f; }
  * { box-sizing:border-box; }
  body { width:320px; margin:0; background:var(--bg); color:var(--text); font-family:ui-sans-serif,system-ui,-apple-system,sans-serif; font-size:13px; line-height:1.5; }
  header { padding:14px 16px 10px; border-bottom:1px solid var(--line); }
  header h1 { font-size:14px; margin:0; }
  header p { margin:3px 0 0; color:var(--muted); font-size:11px; }
  .section { padding:16px; border-bottom:1px solid var(--line); }
  .label { font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin:0 0 10px; }
  .big { font-size:30px; font-weight:700; line-height:1.1; }
  .mid { font-size:20px; font-weight:700; }
  .sub { color:var(--muted); margin-top:4px; }
  .status { margin-top:8px; font-weight:600; }
  .bar { height:8px; border-radius:99px; background:#2a2623; overflow:hidden; margin:10px 0 4px; }
  .bar > span { display:block; height:100%; }
  .week { margin-top:14px; color:var(--muted); font-size:12px; }
  .note { color:var(--muted); font-size:11px; margin-top:6px; }
  .empty { color:var(--muted); }
</style>
</head>
<body>
  <header>
    <h1>TAA &middot; your Claude usage</h1>
    <p>Everything stays on your computer. Nothing is sent anywhere.</p>
  </header>

  <div class="section">
    <div class="label">How much Claude you have left</div>
    <div id="usageBox"><div class="empty">Send a message in Claude, then reopen this to see your usage.</div></div>
  </div>

  <div class="section">
    <div class="label">Your history, across all chats</div>
    <div id="historyBox"><div class="empty">Open claude.ai to scan your chats.</div></div>
  </div>

  <div class="section">
    <div class="label">This chat</div>
    <div id="chatBox"><div class="empty">Open a chat to see its size.</div></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
